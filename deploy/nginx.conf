# ============================================================
# ERP 财务系统 Nginx 配置
# ============================================================
# 域名：erp.iptt.top
# 前端：静态文件（/var/www/erp/frontend/dist）
# 后端：反向代理到 Node.js（localhost:3001）
# SSL：Let's Encrypt 证书
# ============================================================

server {
    listen 80;
    server_name erp.iptt.top;
    # HTTP → HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.iptt.top;

    # ===== SSL 证书 =====
    ssl_certificate     /etc/letsencrypt/live/erp.iptt.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.iptt.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== 前端静态文件 =====
    root /var/www/erp/frontend/dist;
    index index.html;

    # SPA 路由：所有非 API/静态资源请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（Vite 构建产物带 hash，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===== 后端 API 反向代理 =====
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 上传文件大小限制（对账/导入 Excel）
        client_max_body_size 20m;

        # 超时设置（导出大文件可能耗时）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ===== 日志 =====
    access_log /var/log/nginx/erp_access.log;
    error_log  /var/log/nginx/erp_error.log;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
