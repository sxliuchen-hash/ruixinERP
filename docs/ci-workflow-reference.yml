# GitHub Actions CI 参考配置
#
# 由于当前推送令牌缺少 `workflow` 权限，无法直接推送 .github/workflows/*。
# 启用方式（二选一）：
#   1) 在 GitHub 网页：Add file → Create new file → 路径填 `.github/workflows/ci.yml` → 粘贴下方内容（去掉本说明）→ 提交；
#   2) 给推送令牌授予 `workflow` scope 后，把本文件内容放到 `.github/workflows/ci.yml` 再推送。
#
# ===================== 以下为 ci.yml 内容 =====================
name: CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Lint + Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      # 纯函数单测；集成测试（tests/integration/*）默认 describe.skip，
      # 需在配置了测试库的环境设置 RUN_DB_TESTS=1 才会执行（见 tests/integration/README.md）
      - name: Jest (unit)
        run: npx jest --ci
