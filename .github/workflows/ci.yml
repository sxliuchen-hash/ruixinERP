name: CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Lint + Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      # 纯函数单测；集成测试（tests/integration/*）默认 describe.skip，
      # 需在配置了测试库的环境设置 RUN_DB_TESTS=1 才会执行（见 tests/integration/README.md）
      - name: Jest (unit)
        run: npx jest --ci
